# Pre-merge guardrails — typecheck, verify scripts, Rust compile, dependency audit.
# Tier: Pass B/WIP (cargo-audit warns if missing; npm audit fails moderate+).
name: CI

on:
  push:
    branches:
      - main
      - wip/**
  pull_request:
    branches:
      - main
      - wip/**

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/.tmp/cargo-target
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            pkg-config

      - name: Install npm dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend (toolbar guardrail input)
        run: npm run build

      - name: Shell restore guardrails
        run: npm run verify:shell-restore

      - name: Session idle guardrails
        run: npm run verify:session-idle

      - name: UI toolbar guardrails
        run: npm run verify:ui-toolbar

      - name: Metadata backup export guardrails
        run: npm run verify:metadata-backup

      - name: Play session migration scaffold (PRH-01)
        run: npm run verify:play-session-migration

      - name: Rust compile check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --quiet

      - name: Dependency audit (npm + cargo)
        run: npm run verify:deps
        timeout-minutes: 10
